<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>DevLink Saver</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Inter", sans-serif;
        background-color: #f5f5f5;
        color: #000;
        width: 320px;
        min-height: 480px;
        position: relative;
        display: flex;
        flex-direction: column;
        border: 4px solid #000;
        overflow-x: hidden;
      }
      ::selection {
        background: #000;
        color: #fff;
      }

      /* Halftone Effect */
      .halftone-bg {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-image: radial-gradient(
          circle,
          #000 1.5px,
          transparent 1.5px
        );
        background-size: 8px 8px;
        opacity: 0.15;
        pointer-events: none;
        z-index: 0;
      }

      /* Core Layouts */
      .header {
        position: relative;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 16px;
        border-bottom: 3px solid #000;
        background-color: #e5e5e5;
      }
      .header-logo {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .logo-box {
        width: 24px;
        height: 24px;
        border: 2px solid #000;
        background: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 900;
        font-size: 10px;
        box-shadow: 2px 2px 0 0 #000;
      }
      .header h1 {
        font-size: 12px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        line-height: 1;
      }
      .header p {
        font-size: 8px;
        font-weight: 700;
        color: #666;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-top: 2px;
      }

      .abort-btn {
        font-size: 9px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        border: 2px solid transparent;
        background: transparent;
        cursor: pointer;
        padding: 2px 4px;
        transition: color 0.2s;
      }
      .abort-btn:hover {
        color: #dc2626;
        border-color: #000;
      }

      .view {
        position: relative;
        z-index: 10;
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 16px;
        background-color: #f5f5f5;
      }
      .hidden {
        display: none !important;
      }

      /* Loader */
      .loader-view {
        align-items: center;
        justify-content: center;
        padding: 48px 0;
      }
      .spinner {
        width: 24px;
        height: 24px;
        border: 4px solid #000;
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        100% {
          transform: rotate(360deg);
        }
      }
      .loader-text {
        font-size: 10px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-top: 12px;
      }

      /* Typography & Utils */
      h2.title {
        font-size: 28px;
        font-weight: 900;
        text-transform: uppercase;
        line-height: 1;
        letter-spacing: -0.05em;
        margin-bottom: 8px;
      }
      p.subtitle {
        font-size: 9px;
        font-weight: 700;
        color: #555;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        border-left: 2px solid #000;
        padding-left: 8px;
        margin-bottom: 24px;
      }

      .form-group {
        margin-bottom: 12px;
      }
      .form-label {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        font-size: 9px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        border-bottom: 2px solid #000;
        padding-bottom: 4px;
        margin-bottom: 6px;
      }

      select,
      input,
      textarea {
        width: 100%;
        padding: 10px 12px;
        border: 2px solid #000;
        background: #e5e5e5;
        font-family: inherit;
        font-size: 11px;
        font-weight: 700;
        outline: none;
        transition: all 0.2s;
        resize: none;
        color: #000;
      }
      select:focus,
      input:focus,
      textarea:focus {
        background: #fff;
        box-shadow: 3px 3px 0 0 #000;
      }
      textarea {
        font-family: monospace;
        font-size: 11px;
        font-weight: bold;
      }

      .type-select {
        background: transparent;
        border: none;
        font-size: 9px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        cursor: pointer;
        color: #000;
      }

      .btn {
        width: 100%;
        background: #000;
        color: #fff;
        padding: 10px 16px;
        font-size: 10px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        border: 2px solid #000;
        box-shadow: 3px 3px 0 0 #000;
        cursor: pointer;
        transition: all 0.1s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      .btn:hover {
        box-shadow: 5px 5px 0 0 #000;
      }
      .btn:active {
        box-shadow: none;
        transform: translateY(2px);
      }
      .btn:disabled {
        opacity: 0.5;
        pointer-events: none;
      }

      .error-text {
        color: #dc2626;
        font-size: 9px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        text-align: center;
        margin-top: 8px;
      }
      .status-box {
        background: #e5e5e5;
        border: 2px solid #000;
        text-align: center;
        padding: 4px;
        font-size: 9px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: #000;
      }
      .status-success {
        color: #16a34a;
      }
      .status-error {
        color: #dc2626;
      }

      .material-symbols-outlined {
        font-size: 16px;
        vertical-align: middle;
      }

      .select-wrapper {
        position: relative;
      }
      .select-wrapper select {
        appearance: none;
        cursor: pointer;
        position: relative;
        z-index: 10;
        background: transparent;
      }
      .select-wrapper::after {
        content: "expand_more";
        font-family: "Material Symbols Outlined";
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 16px;
        pointer-events: none;
        opacity: 0.6;
      }
    </style>
  </head>
  <body>
    <div class="halftone-bg"></div>

    <!-- Header -->
    <header class="header">
      <div class="header-logo">
        <div class="logo-box">DL</div>
        <div>
          <h1>Console.</h1>
          <p>Extension Link</p>
        </div>
      </div>
      <button id="logoutBtn" class="abort-btn hidden">Abort</button>
    </header>

    <!-- Loader -->
    <div id="loader" class="view loader-view">
      <div class="spinner"></div>
      <p class="loader-text">Syncing...</p>
    </div>

    <!-- AUTH VIEW -->
    <section id="auth-view" class="view hidden">
      <h2 class="title">Void<br />Detected.</h2>
      <p class="subtitle">Auth required to sync data node to central core.</p>

      <form
        id="loginForm"
        style="display: flex; flex-direction: column; flex: 1"
      >
        <div class="form-group">
          <label class="form-label" style="border: none">Email Access</label>
          <input
            id="emailInput"
            type="email"
            required
            placeholder="USER@NODE.COM"
          />
        </div>
        <div class="form-group">
          <label class="form-label" style="border: none">Security Key</label>
          <input
            id="passwordInput"
            type="password"
            required
            placeholder="••••••••"
          />
        </div>
        <div style="flex: 1"></div>
        <button type="submit" class="btn pt-2">Authenticate</button>
        <p id="authError" class="error-text hidden"></p>
      </form>
    </section>

    <!-- WORKSPACE VIEW -->
    <section id="workspace-view" class="view hidden">
      <form
        id="saveForm"
        style="display: flex; flex-direction: column; height: 100%"
      >
        <div class="form-group">
          <label class="form-label">Target Directory</label>
          <div class="select-wrapper bg-[#e5e5e5]">
            <select id="folderSelect" required>
              <option value="" disabled selected>Retrieving Dirs...</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">
            <span>Data Block (Content)</span>
            <select id="typeSelect" class="type-select">
              <option value="text">TEXT</option>
              <option value="link">LINK</option>
              <option value="image">IMAGE</option>
            </select>
          </label>
          <textarea
            id="contentInput"
            required
            rows="4"
            placeholder="Capture payload reading..."
          ></textarea>
        </div>

        <div class="form-group">
          <label class="form-label">Internal Details</label>
          <textarea
            id="noteInput"
            rows="2"
            style="background: #fff"
            placeholder="Optional context..."
          ></textarea>
        </div>

        <div style="flex: 1"></div>
        <div style="display: flex; flex-direction: column; gap: 8px">
          <p id="saveStatus" class="status-box hidden"></p>
          <button type="submit" id="commitBtn" class="btn">
            Commit Fragment
          </button>
        </div>
      </form>
    </section>

    <script src="popup.js"></script>
  </body>
</html>
